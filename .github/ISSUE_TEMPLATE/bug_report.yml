name: Bug Report
description: Something isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please check the [existing issues](https://github.com/rantuma/hue-dial/issues) to avoid duplicates.

  - type: dropdown
    id: run-method
    attributes:
      label: How are you running hue-dial?
      options:
        - Docker (ghcr.io/rantuma/hue-dial)
        - Binary (built from source)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Run `docker inspect ghcr.io/rantuma/hue-dial --format '{{index .Config.Labels "org.opencontainers.image.version"}}'` or check the startup log for the version string.
      placeholder: "e.g. v1.2.3"
    validations:
      required: true

  - type: input
    id: bridge-firmware
    attributes:
      label: Hue Bridge firmware version
      description: Found in the Hue app under Settings → My Hue system → Bridge → Software version.
      placeholder: "e.g. 1.67.1967054080"
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Press button ...
        2. Rotate dial ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines here. This will be automatically formatted as code.
      render: shell
    validations:
      required: false
