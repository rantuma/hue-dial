name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/rantuma/hue-dial

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Build binaries
        run: |
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          mkdir -p dist
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            output="dist/hue-${os}-${arch}${ext}"
            echo "Building ${platform}..."
            GOOS="$os" GOARCH="$arch" make build VERSION=${{ inputs.version }} OUTPUT="$output"
          done

      - name: Package licenses
        run: tar czf dist/licenses.tar.gz licenses/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  build-docker-amd64:
    name: Build Docker (linux/amd64)
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: VERSION=${{ inputs.version }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true

  build-docker-arm64:
    name: Build Docker (linux/arm64)
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: VERSION=${{ inputs.version }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true

  release:
    name: Release
    needs: [build-binaries, build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ env.IMAGE }}:${{ inputs.version }}" \
            --tag "${{ env.IMAGE }}:latest" \
            "${{ env.IMAGE }}@${{ needs.build-docker-amd64.outputs.digest }}" \
            "${{ env.IMAGE }}@${{ needs.build-docker-arm64.outputs.digest }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/hue-linux-amd64
            dist/hue-linux-arm64
            dist/hue-darwin-amd64
            dist/hue-darwin-arm64
            dist/hue-windows-amd64.exe
            dist/hue-windows-arm64.exe
            dist/licenses.tar.gz
